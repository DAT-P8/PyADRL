name: Type Check

permissions:
  contents: read

on:
  pull_request:

jobs:
  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install .

      - name: Run build script
        run: bash build.sh

      - uses: jakebailey/pyright-action@v1
